<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Drama - roxy-drachin</title>
  
  <!-- Font Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
</head>
<body data-page="watch">
  <!-- Skip Link -->
  <a href="#main-content" class="skip-link">Lewati ke konten utama</a>
  
  <!-- Navbar Container -->
  <div class="navbar-container"></div>
  
  <!-- Main Content -->
  <main id="main-content">
    <!-- Video Player Section -->
    <section class="video-section">
      <div class="container">
        <div class="video-container">
          <div class="video-player-wrapper">
            <div id="video-player" class="video-player">
              <video id="video-element" controls autoplay playsinline>
                <source src="" type="video/mp4">
                Browser Anda tidak mendukung video tag.
              </video>
              <div id="video-loading" class="video-loading">
                <div class="spinner"></div>
                <p class="video-loading-text">Memuat video...</p>
              </div>
              <div id="video-error" class="video-error is-hidden">
                <div class="error-icon">✕</div>
                <h3 class="error-title">Video Tidak Dapat Diputar</h3>
                <p class="error-message">Silakan coba episode lain atau refresh halaman</p>
                <button class="btn btn-primary" onclick="retryVideo()">Coba Lagi</button>
              </div>
            </div>
            <div class="video-info">
              <h1 id="video-title" class="video-title"></h1>
              <div id="video-meta" class="video-meta"></div>
            </div>
          </div>
          
          <div class="video-controls">
            <button id="prev-episode-btn" class="btn btn-secondary" onclick="changeEpisode(-1)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
              </svg>
              Episode Sebelumnya
            </button>
            <button id="next-episode-btn" class="btn btn-primary" onclick="changeEpisode(1)">
              Episode Berikutnya
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </section>
    
    <!-- Episode Sidebar -->
    <section class="episode-sidebar">
      <div class="container">
        <h2 class="sidebar-title">Daftar Episode</h2>
        <div id="episode-list" class="episode-list-sidebar"></div>
      </div>
    </section>
  </main>
  
  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <div class="footer-logo">roxy<span>-drachin</span></div>
          <p class="footer-text">Platform streaming drama China terlengkap dan terpercaya.</p>
        </div>
        <div class="footer-links">
          <h4>Menu</h4>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="browse.html">Browse</a></li>
            <li><a href="popular.html">Populer</a></li>
            <li><a href="search.html">Cari</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p class="footer-bottom-text">© 2025 roxy-drachin. All rights reserved.</p>
      </div>
    </div>
  </footer>
  
  <!-- JavaScript Modules -->
  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/components.js"></script>
  <script type="module" src="js/pages/watch.js"></script>
</body>
</html>
